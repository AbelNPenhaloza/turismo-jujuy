<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Jujuy - Purmamarca</title>
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/componentes.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
</head>
<body>
    <main class="container my-5" id="main-content">
        <section class="text-center mb-5 py-5 bg-dark text-white rounded shadow" 
                 style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('../assets/images/purmamarca-hero.jpg') center/cover;">
            <h1 class="display-4 fw-bold">Purmamarca</h1>
            <p class="lead">El pueblo de la Tierra de Colores</p>
        </section>

        <div class="row mb-4">
            <div class="col-12 text-center">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-primary filter-btn" data-filter="all">Todo</button>
                    <button type="button" class="btn btn-outline-primary filter-btn" data-filter="paisaje">Paisajes</button>
                    <button type="button" class="btn btn-outline-primary filter-btn" data-filter="cultura">Cultura</button>
                </div>
            </div>
        </div>

        <div class="row g-4" id="gallery-container">
            <div class="col-sm-12 col-md-6 col-lg-4 gallery-item" data-category="paisaje">
                <div class="card h-100 border-0 shadow-sm zoom-effect">
                    <img src="../assets/images/cerro-7-colores.jpg" class="card-img-top rounded shadow" alt="Cerro Siete Colores">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Cerro de los Siete Colores</h5>
                        <p class="card-text text-muted">Una maravilla natural única en el mundo.</p>
                    </div>
                </div>
            </div>
            </div>

        <section class="mt-5 pt-5">
            <h2 class="h3 fw-bold mb-4 border-bottom pb-2">Precios Excursiones</h2>
            <div class="table-responsive">
                <table class="table table-hover align-middle shadow-sm">
                    <thead class="table-primary">
                        <tr>
                            <th>Excursión</th>
                            <th>Duración</th>
                            <th>Precio (ARS)</th>
                            <th>Info</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Paseo de los Coloraditos</td>
                            <td>2 Horas</td>
                            <td>$5.000</td>
                            <td><i class="bi bi-info-circle text-primary" data-bs-toggle="tooltip" title="Excursión de baja dificultad"></i></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/destinos.js"></script>
</body>
</html>
